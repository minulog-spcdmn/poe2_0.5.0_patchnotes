{id:'uniques',title:'Unique Item Changes',icon:'🔶',e:[['change','<strong>Ab Aeterno</strong> (Boots): No longer has 10% less Movement and Skill Speed per Dodge Roll in the past 20 seconds. Now has 200–250% increased Armour, Evasion and Energy Shield (was 100–150%). New: Your speed is unaffected by Slows while Sprinting; Gain Overencumbrance for 4 seconds when you Dodge Roll. Updatable to new defence values with a Divine Orb.'],['nerf','<strong>Apep\'s Supremacy</strong> (Focus): No longer has 30–50% faster start of Energy Shield Recharge.'],['change','<strong>Atziri\'s Acuity</strong> (Gloves) reworked: 150–200% increased Armour, +100–150 to maximum Life, Leech 10% of Physical Attack Damage as Life, 10% of Physical Damage dealt by Hits causes Blood Loss and Vaal Pact. Also grants the Herald of the Royal Queen Skill. Vaal Cultivation Orb outcomes also changed. Existing items not affected.'],['change','<strong>Sierran Inheritance</strong> (Body Armour): 15–30% increased Energy Shield Recharge Rate (was 30–50% faster start of Energy Shield Recharge).'],['change','<strong>Blackflame</strong> (Ring): No longer has Enemies Ignited by you take Chaos Damage instead of Fire Damage. Now has: Withered you inflict also increases Fire Damage taken; Ignite you Inflict deals Chaos Damage instead of Fire damage; Withered does not expire on enemies Ignited by you. 80–100% increased Ignite Magnitude (was 50%); 60–75% reduced Ignite Duration on Enemies (was 50%). Magnitude and Duration updatable with a Divine Orb.'],['buff','<strong>Blistering Bond</strong> (Ring): Now has Fire Damage also Contributes to Bleeding Magnitude, and Bleeding you Inflict deals Fire damage instead of Physical damage, in addition to its other modifiers. Existing items not affected.'],['nerf','<strong>Brass Dome</strong> (Body Armour): 500–600% increased Armour (was 700–800%). Existing versions can be made worse with a Divine Orb.'],['buff','<strong>Carnage Heart</strong> (Amulet): Now has 25–50% increased Damage while Leeching. Existing items unaffected.'],['buff','<strong>Chober Chaber</strong> (Mace): Now has +2–3 to Level of All Minion Skills. Existing items not affected.'],['change','<strong>Death\'s Harp</strong> (Bow): No longer has Bow Attacks Fire 3 Additional Arrows. Now has +250–330% Surpassing Chance to Fire an Additional Arrow.'],['buff','<strong>Elevore</strong> (Helmet): Charms gain 1 Charge per second (was 0.5). +1–2 Charm Slots (was +1). Existing items can be buffed with a Divine Orb.'],['change','<strong>Eshtera\'s Path</strong> (Ring): No longer has Cold Resistance is unaffected by Area Penalties. Now has +5–10% to Fire and Cold Resistance per Equipped Item with a Lightning Resistance Modifier. Existing items not affected.'],['buff','<strong>Glowswarm</strong> (Ring): Now has Using a Mana Flask grants Guard equal to 100% of the Flask\'s Recovery amount for 4 seconds. Existing items not affected.'],['buff','<strong>Hollow Mask</strong> (Helmet): Now grants the Wildwood\'s Gifts Skill (Azmerian spirits offer guidance, showing nearby Ancient Blooms). Also: Remnants you create affect Allies in your Presence when collected; 80–100% increased Reservation Efficiency of Remnant Skills.'],['change','<strong>Husk of Dreams</strong> (Body Armour) renamed to <strong>Reverie</strong>. No longer has 20–30% increased Flash Charges gained or 50% less Flask Charges used. Now grants the Rite of Restoration Skill and Non-Unique Life Flasks apply their effects constantly. Also: Cannot use Life Flasks; Recovery from Life Flasks cannot be instant; Recovery from Life Flasks cannot be applied to anything other than you; 40–60% less Life Flask Recovery. Existing items cannot obtain new modifiers.'],['nerf','<strong>Hyrri\'s Ire</strong> (Body Armour): 100–150% Increased Evasion Rating (was 200–250%). 10–20% of Damage as Extra Cold Damage (was 15–25%). Existing versions can be made worse with a Divine Orb.'],['buff','<strong>Keeper of the Arc</strong> (Helmet): 240–340% increased Armour and Energy Shield (was 150–250%). Updatable with a Divine Orb.'],['change','<strong>Levinstone</strong> (Ring): No longer has +1 to Level of all Lightning Skills. Now has Lightning Skills Chain +1 times.'],['buff','<strong>Megalomaniac</strong> (Jewel): Now drops identified.'],['change','<strong>Plaguefinger</strong> (Gloves): Now has Cannot inflict Elemental Ailments.'],['change','<strong>Prized Pain</strong> (Ring): No longer has Deal your Thorns Damage to Enemies you Stun with Melee Attacks. Now has 15–25% chance to deal your Thorns damage to enemies you Hit with Melee Attacks. Existing items not affected.'],['buff','<strong>Radiant Grief</strong> (Helmet): Enemies in your Presence Ignited as though dealt 200 Base Fire Damage (was 100). Updatable with a Divine Orb.'],['change','<strong>Safrin\'s Resolve</strong> (Ring): No longer has Lightning Resistance is unaffected by Area Penalties. Now has +5–10% to Cold and Lightning Resistance per Equipped Item with a Fire Resistance Modifier. Existing items not affected.'],['change','<strong>Seed of Cataclysm</strong> (Ring): No longer has 30–50% increased Critical Spell Damage Bonus. Now has 5% reduced Critical Spell Damage Bonus per Critical Hit with Spells Recently, and 15–30% chance for Spell Damage with Critical Hits to be Lucky. Existing items not affected.'],['change','The <strong>Sekhema\'s Resolve Unique Rings</strong> have been renamed to Safrin\'s Resolve, Zaida\'s Longevity, and Eshtera\'s Path.'],['change','<strong>Sine Aequo</strong> (Gloves): 150–200% increased Armour, Evasion and Energy Shield (was 100–150%). No longer Enemies Immobilised by you take 20% more Damage; now 30–50% increased Damage against Immobilised Enemies.'],['buff','<strong>Soul Mantle</strong> (Body Armour): No longer has 20–30% reduced Totem Life; now has +75 to Spirit. Existing items not affected.'],['buff','<strong>Svalinn</strong> (Shield) Cast on Block Skill: Supported Skills Cost nothing. Also now has +50–100 Runic Ward. Existing items not affected.'],['change','<strong>Zaida\'s Longevity</strong> (Ring): No longer has Lightning Resistance is unaffected by Area Penalties. Now has +5–10% to Fire and Lightning Resistance per Equipped Item with a Cold Resistance Modifier. Existing items not affected.'],['change','<strong>Zerphi\'s Genesis</strong> (Belt): No longer has 10–30% increased Charm Charges used. Now has: 50% of Life Flask Charges granted to Charms; Skills from Corrupted Gems have 15–25% increased Cost Efficiency during any Flask Effect; 25–50% increased Corrupted Charms Effect Duration.']]},
{id:'items',title:'Item Changes',icon:'📦',e:[['change','<strong>Greater and Perfect currencies</strong> made somewhat rarer. Transmutation and Augmentation made significantly rarer.'],['buff','<strong>Greater Orbs of Transmutation and Augmentation</strong>: minimum Modifier Level now 44 (was 55). Can now begin dropping in Act 4.'],['buff','<strong>Divine Orbs</strong> are now more common.'],['change','The Corruption outcome that randomises numeric modifier values now <strong>multiplies each modifier based on the current value</strong> instead of randomising the value. Sanctifying an item also now multiplies each modifier value based on the current value.'],['change','<strong>Omen of Corruption</strong> can no longer be obtained.'],['buff','<strong>Martial Weapons and Flasks</strong> found in the campaign are now more likely to be of the highest base type available at that level.'],['buff','The overall number of <strong>Essences</strong> found in the campaign has been increased, though the proportion being Essences of the Infinite has been significantly decreased. This leads to finding more useful essences as you progress.'],['buff','<strong>Armour</strong> granted by items and modifiers increased at higher levels. At level 65, approximately 33% more Armour, tapering to 15% more at level 80+.'],['buff','<strong>Evasion</strong> granted by items and modifiers increased at higher levels. At level 65, approximately 33% more Evasion, tapering to 15% more at level 80+.'],['buff','<strong>Energy Shield</strong> granted by items is now roughly 8% more at level 65, unchanged at level 80+.'],['nerf','<strong>Vile Robe</strong>: 171 Base Energy Shield (was 184).'],['change','Base Armour of existing items will be automatically adjusted. Armour Modifiers on existing items can be updated with a Divine Orb.'],['buff','Base Weapon Range increased: <strong>One-hand Maces</strong> 1.3 (was 1.1); <strong>Two-hand Maces</strong> 1.5 (was 1.3); <strong>Quarterstaves</strong> 1.4 (was 1.3).'],['nerf','<strong>Obliterator Bow and Artillery Bow</strong> basetypes: 1.1 Attacks per second (was 1.15).'],['buff','Implicit for <strong>Warden and Guardian Bows</strong>: 25–35% chance to Chain an additional time (was 20–30%). Updatable with Divine Orb.'],['nerf','Implicit for <strong>Rabid, Fury, and Maji Talismans</strong>: +7–10 Maximum Rage (was +8–12). Updatable with Divine Orb.'],['buff','Implicit for <strong>Voltfang and Thunder Talismans</strong>: 20–30% increased Magnitude of Shock you inflict (was 15–25%). Updatable with Divine Orb.'],['buff','Alternate Quality items (from Breach Catalysts) may now be <strong>salvaged to return a portion of the Catalysts used</strong>.'],['nerf','<strong>+Level of Melee Skills on Two Handed Attack Weapons</strong>: Tier 1 now +5 (was +7), lower tiers adjusted. <strong>+Level of Projectile Skills on Two Handed Attack Weapons</strong>: Tier 1 now +5 (was +7).'],['nerf','<strong>+Level of Melee Skills on One-handed Attack Weapons</strong>: Tier 1 now +4 (was +5). <strong>+Level of Projectile Skills on One-handed Attack Weapons</strong>: Tier 1 now +4 (was +5).'],['nerf','<strong>+2 to level of Projectile Skills on Quivers</strong>: now +1.'],['change','The plus to level all Gems on Attack Weapons can now only roll above level 18.'],['new','Added <strong>Surpassing chance to fire an additional Arrow</strong> modifiers for Quivers.'],['nerf','<strong>Perfect Essence of Battle</strong>: +3 to Level of all Attack Skills on Two Hand Melee Weapons or Crossbows (was +5); +2 on One Handed Melee Weapons or Bows (was +3).'],['nerf','<strong>Essence of Hysteria</strong>: 20–23% increased Energy Shield Recharge Rate when applied to Foci (was 41–45%).'],['buff','<strong>Body Runes</strong>: +30/45/60 Max Life in Armour (was +20/30/40); +30/40/50 Max ES in Staves/Wands (was +25/30/35); Leech 3/4/5% Physical Damage as Life in Martial Weapons (was 2/2.5/3%).'],['buff','<strong>Mind Runes</strong>: +20/30/40 Max Mana in Armour (was +15/25/35); +45/60/75 Max Mana in Staves/Wands (was +30/40/50); Leech 2/3/4% Physical Damage as Mana (was 1.5/2/2.5%).'],['buff','<strong>Rebirth Runes</strong>: Gain 15/25/35 Life per enemy killed in Martial Weapon (was 10/20/30); Regenerate 0.35/0.4/0.45% Max Life per second in Armour (was 0.25/0.3/0.35%).'],['nerf','<strong>Lesser/Rebirth/Greater Rebirth Runes</strong> in Wands/Staves: 4/6/8% increased Energy Shield Recharge Rate (was 12/15/18%). Applies to existing items.'],['buff','<strong>Inspiration Runes</strong>: Gain 10/20/30 Mana per enemy killed in Martial Weapon (was 8/16/24); 20/25/30% increased Mana Regeneration in Staves/Wands (was 16/20/24%).'],['buff','<strong>Stone Runes</strong>: 20/30/40% increased Stun Buildup in Martial Weapon (was 20/25/30%); +50/75/100 to Stun Threshold in Armour (was +40/60/80).'],['buff','<strong>Vision Runes</strong>: +60/90/120 Accuracy in Martial Weapon (was +50/80/110); 8/12/16% Life and Mana Flask Recovery in Armour (was 8/10/12%).'],['buff','<strong>Desert Runes</strong>: +10/14/18% Fire Resistance in Armour (was +10/12/14%). Bonded modifier on Martial Weapons/Wands/Staves: 30% increased Ignite Magnitude (was 25%).'],['buff','<strong>Glacial Runes</strong>: +10/14/18% Cold Resistance in Armour (was +10/12/14%). <strong>Storm Runes</strong>: +10/14/18% Lightning Resistance in Armour (was +10/12/14%).'],['buff','<strong>Robust Runes</strong>: +6/9/12 Strength (was +6/8/10). <strong>Adept Runes</strong>: +6/9/12 Dexterity (was +6/8/10). <strong>Resolve Runes</strong>: +6/9/12 Intelligence (was +6/8/10).'],['buff','<strong>Standard Rune Bonded Modifiers</strong>: 20 Life and 20 Mana in Armour items (was 10 Life and 10 Mana).'],['nerf','<strong>Craiceann\'s Rune of Recovery</strong>: 30% increased Energy Shield Recharge Rate in Body Armour (was 50%). Applies to existing items.'],['change','<strong>Lady Hestra\'s Rune of Winter</strong>: now Adds 19–28 Cold Damage against Chilled or Frozen Enemies (was unconditional). <strong>Thane Leld\'s Rune of Spring</strong>: Adds 1–60 Lightning Damage against Shocked Enemies. <strong>Thane Myrk\'s Rune of Summer</strong>: Adds 23–34 Fire Damage against Ignited Enemies.'],['new','All Idols can now also be socketed into <strong>Sceptres</strong>, gaining new modifiers when socketed there.'],['buff','<strong>Idol of Egrin</strong>: 20% increased Curse Duration when socketed into a Sceptre.'],['change','<strong>Idol of Eeshta</strong>: 15% increased Cost Efficiency in Helmet (was 12%). 30% increased Mana Recovery Rate while Companion in Presence when socketed in Sceptre.'],['buff','<strong>Idol of Grold</strong>: now socketed in Boots. 50% increased total Power counted by Warcries (was 20%). 15% increased Damage per different Companion in Presence when socketed in Sceptre. Bonded: 30% increased glory generation (was 20%).'],['buff','<strong>Idol of Maxarius</strong>: 0.2 Flask Charges per second when socketed in a Sceptre.'],['buff','<strong>Idol of Ralakesh</strong>: 40% increased Armour, Evasion and Energy Shield while Companion in Presence when socketed in Sceptre.'],['change','<strong>Idol of Sirrius</strong>: Allies in Presence 8% increased Movement Speed when socketed in Sceptre. Bonded: 20% reduced slow potency (was 15%).'],['buff','<strong>Idol of Thruldana</strong>: Allies in Presence deal 13–27 Added Attack Chaos Damage when socketed in Sceptre.'],['buff','<strong>Bear Idol</strong>: 10% increased Area of Effect in Helmets (was 8%). Bonded: 12% increased Reservation Efficiency of Companion Skills in Helmets (was 10%).'],['change','<strong>Boar Idol</strong>: Allies in Presence Regenerate 0.5% of your Maximum Life per second when socketed in Sceptres (was Regenerate 8 Life per second). Bonded: 25% increased Warcry Cooldown Recovery Rate in Gloves (was 15%).'],['buff','<strong>Cat Idol</strong>: 25% increased Accuracy Rating in Gloves (was 15%). Bonded: 30% increased Charm Charges gained in Gloves (was 20%).'],['change','<strong>Fox Idol</strong>: Limit 1. Now grants Other Socketed Idols in this item also grant their Bonded Modifiers when socketed in Body Armours (was +2% to Quality of all Skills). Bonded: +5% to Quality of all Skills in Body Armours (was +4 to all attributes).'],['buff','<strong>Owl Idol</strong>: 12% increased Cooldown Recovery Rate in Foci (was 10%). Allies in Presence 10% increased Cast Speed in Sceptres (was 8%). Bonded: 20% increased effect of Archon Buffs in Foci (was 15%).'],['buff','<strong>Ox Idol</strong>: 15% increased Block chance in Shields and Bucklers (was 10%). Allies in Presence +12% to all Elemental Resistances in Sceptres (was 8%). Bonded: 15% chance for Damage of Enemies Hitting you to be unlucky in Shields/Bucklers (was 10%).'],['buff','<strong>Primate Idol</strong>: Minions 15% increased maximum Life in Helmet (was 12%). Allies in Presence deal 40% increased Damage in Sceptre (was 30%). Bonded: Remnants can be collected from 15% further away in Helmets (was 20%).'],['buff','<strong>Rabbit Idol</strong>: Limit 1. 12% increased Rarity of Items in Body Armours (was 5%). 15% increased Spirit in Sceptres (was 10%). Bonded: 10% increased Quantity of Gold Dropped in Body Armours (was 5%).'],['buff','<strong>Snake Idol</strong>: 8% increased Curse Magnitude in Gloves (was 5%). Allies in Presence 10% increased Attack Speed in Sceptre (was 8%). Bonded: Remnants 15% increased Effect in Gloves (was 10%).'],['change','<strong>Stag Idol</strong>: Limit 1. 15% chance for Projectiles to Fork in Helmets (was 50% increased Thorns Critical Hit Chance). Bonded for Helmets: 30% chance for an additional Projectile when Forking (was Thorns Damage has 40% chance to ignore Enemy Armour).'],['buff','<strong>Wolf Idol</strong>: 15% increased Bleeding Magnitude in Gloves (was 10%). Allies in Presence 20% increased Critical Damage Bonus in Sceptres (was 14%). Bonded: 25% reduced Bleeding Magnitude on you in Gloves (was 15%).'],['change','<strong>Atmohua\'s Soul Core of Retreat</strong>: No longer grants 30% faster start of Energy Shield Recharge in Body Armour or Focus. Now grants Gain additional Ailment Threshold equal to 15% of maximum Energy Shield, and Gain additional Stun Threshold equal to 15% of maximum Energy Shield. Applies to existing items.'],['buff','<strong>Maximum Rage on Ruby Jewels</strong>: Can now roll +1–2 to Maximum Rage (was +1). Updatable with Divine Orb. <strong>Increased Chaos Damage on Sapphire Jewels</strong>: 7–13% (was 6–12%). Updatable with Divine Orb.'],['change','Suffix modifiers granting faster start of Energy Shield Recharge can no longer roll on Foci, Intelligence Body Armours, or Jewels. Increased Energy Shield Recharge Rate Suffix modifiers can now roll on Intelligence Body Armours.'],['change','Implicit modifier on <strong>Arcane Raiment and Sacramental Robe</strong>: 15–25% increased Energy Shield Recharge Rate (was 40–50% faster start of ES Recharge). Does not affect existing items.'],['change','The Fevered Prefix can no longer roll on Time-Lost Sapphire and Sapphire Jewels. The of Diffusion, of Dispersal, and of Enlivening Suffixes can no longer roll on Body Armours and Foci.'],['nerf','<strong>of Buffering</strong>: 12–15% increased Energy Shield Recharge Rate (was 36–40%). <strong>of Ardour</strong>: 16–19% (was 41–45%). <strong>of Suffusion</strong>: 20–23% (was 46–50%). Existing items can be made worse with a Divine Orb.'],['change','Cast Speed Modifiers on Rings and Amulets are no longer shared with Foci and Wands. Highest tier Cast Speed for Rings now rolls at level 60; for Amulets at level 66. Maximum values unchanged.'],['nerf','<strong>Banner Area of Effect Modifiers on Jewels</strong>: 6–16% (was 10–20%). Updatable with Divine Orb.'],['change','<strong>Desecrated Modifiers granting Instant Leech</strong> can no longer roll. Existing items not affected.'],['change','<strong>Squire\'s</strong> Hybrid Physical Damage and Accuracy on Weapons: minimum level 8 (was 1). <strong>Journeyman\'s</strong>: minimum level 14 (was 11). <strong>Precise</strong> Accuracy on Weapons: minimum level 8 (was 1). <strong>Reliable</strong> Accuracy: minimum level 13 (was 11). Existing items will have their level requirement changed.'],['change','The Gladiatoral Helm basetype has been renamed to <strong>Cassis Helm</strong>.'],['buff','<strong>Oswald</strong> now offers 3,000, 4,000, and 6,000 Gold for Priceless Idols in Act 3 (was 500, 1,000, and 1,500).'],['buff','The gold price of Weapons for <strong>asynchronous trade</strong> has been increased by approximately 50%.'],['change','The Desecrated Map Modifier <strong>of Union</strong> is no longer functional. Legacy modifier that only existed in Early Access leagues.']]},
{id:'monsters',title:'Monster Changes',icon:'💀',e:[['buff','<strong>Culling Strike Threshold</strong> for Normal enemies: 35% of their Maximum Life (was 30%).'],['buff','<strong>Monster Leech resistance</strong> now starts at a later level with lower values at every level. All monster rarities now have the same amount of Leech resistance.'],['buff','<strong>Essence Monster Packs</strong> are now affected by modifiers to Pack Size.'],['change','Azmeri Spirits released from monsters now <strong>retain their power</strong> and empower other spirits released from the monster.'],['fix','The beam from the <strong>Priest of the Sun</strong> will no longer ignore some walls.'],['buff','Flask charges refill when <strong>Viper Napuatzi\'s</strong> soldiers constrict the size of her arena.'],['change','The <strong>Burning Dead</strong> in Ogham Village now deal a portion of their damage as Fire (was purely Physical).'],['change','Improved the visuals and telegraphing of the <strong>Lightning Doryani\'s Elite Monster</strong>.']]},
{id:'quests',title:'Quest Changes',icon:'📜',e:[['change','You can no longer enter <strong>Plunder\'s Point</strong> until you have turned in all 4 Map Pieces in Kingsmarch.'],['buff','You now receive a <strong>Greater Mind Rune</strong> in the Halls of the Dead when interacting with Navali (was a Lesser Mind Rune).'],['buff','You no longer need to visit the <strong>Halani Gates</strong> in order to access Traitor\'s Passage if you have already freed Risu.']]},
{id:'ui',title:'UI Changes',icon:'🖥',e:[['new','Added <strong>accessibility settings</strong> to increase the size of popups. Found in the UI section of the Options panel.'],['new','Added a dedicated keybind to perform a <strong>Dodge Roll</strong> that will not cause the player to sprint when held down. Unbound by default; must be manually assigned in input options.'],['new','Added a <strong>Show Only Available</strong> option to the Hideout Decorations list when using Mouse and Keyboard.'],['buff','For <strong>click-to-move players</strong>: clicking to move while channelling a skill that can be used while moving will no longer interrupt channelling. Significantly improves usability of Flame Breath and Incinerate.'],['buff','Improved visual clarity, load times, and performance on the <strong>Acts 1–3 World Maps</strong>. Also made more accurate to in-game area directionality.'],['change','Skill information popouts no longer move modified stats to the top of the panel. They are still shown in blue.'],['change','The notification shown when an item in your <strong>Merchant Tab Shop</strong> has sold now displays a different message when the sold item is in a different league.'],['buff','The reroll button in the <strong>Ritual UI</strong> now pulses when you have free rerolls available.'],['change','<strong>Empowered Minions</strong> (from various modifiers or sources) now update the text for Minion displayed on the monster.'],['change','The <strong>Augments Stash Tab</strong> has been updated and now has five sections.'],['new','Marking an enemy now shows the <strong>Mark on their life bar</strong>.'],['new','Maximum rage, rage loss delay, and rage loss per second are now displayed in the <strong>character panel</strong>.'],['buff','Increased the maximum character limit of <strong>search textboxes</strong> to 250 characters.'],['buff','Copying an item\'s text now always copies the <strong>advanced description format</strong>. Searching by an item\'s text will now match the advanced description format.'],['new','You can now set <strong>Favourite trades</strong> on the Currency Exchange when using Mouse and Keyboard.'],['new','You can now <strong>pin a tracking scroll</strong> to your social profile to display to friends, guild, and party members.'],['new','You can now <strong>preview microtransaction weapon skins</strong> in the cosmetics shop without needing the applicable weapon type equipped.'],['new','Added a <strong>top-down camera view</strong> for editing your hideout when using a controller.'],['new','Added a feature to quickly change the <strong>Currency you are currently applying</strong> when playing with a controller.'],['change','<strong>Reworked the Currency Exchange UI</strong> when playing with a controller.'],['change','Improved <strong>target selection</strong> for items and interactable objects when using a controller.'],['change','Updated and restructured the <strong>Options menu</strong>.'],['new','Enabled <strong>in-game clock</strong> option for PlayStation and Xbox.']]},
{id:'mtx',title:'Microtransaction Changes',icon:'💳',e:[['new','Enabled the following existing Armour Set microtransactions for Path of Exile 2: <strong>Arcane, Arctic Crystal, Assassin, Atlantis, Black and White, Chimera, Coliseum, Cursed, Darkprism, Doomguard, Eclipse, Eyrie, Fire, Fire and Ice, Imperial Eagle, Mageguard, Malachai, Miracle, Scavenger, Seeker, Twilight, Void Emperor, Vulcan, and Wild.</strong>'],['new','Enabled the following existing Back Attachment microtransactions for Path of Exile 2: Apollyon Cloak, Apollyon Wings, Arcane Cloak, Assassin Cloak, Azurite Back Attachment, Balefire Back Attachment, Corsair Back Attachment, Corsair Cloak, Crucible Back Attachment, Darkwood Cloak, Dreadspire Cloak, Empyrean Back Attachment, Glimmersprite Wings, Gorgon Back Attachment, Illusionist Back Attachment, Innocence Cloak, Innocence Wings, Lightbringer Cloak, Lightbringer Wings, Midnight Pact Cloak, Midnight Pact Wings, Misery Swords Back Attachment, Misery Wings, Myrmidon Cloak, Necrotic Cloak, Necrotic Wings, Nightfall Cloak, Nightfall Wings, Orion Back Attachment, Overseer Cloak, Overseer Wings, Pitfighter Back Attachment, Rapture Back Attachment, Scavenger Back Attachment, Seraph Banner Back Attachment, Sin Cloak, Sin Wings, Spectre Cloak, Spectre Wings, Spider Back Attachment, Scavenger Tail Attachment, Starfall Cloak, Starfall Wings, Suffering Back Attachment, Suffering Cloak, Sunprism Cloak, Sunprism Wings, Sunrise Cloak, Sunrise Wings, Twilight Cloak, Vaal Orb Cloak, Vampiric Wings, Vanguard Banner Back Attachment, and Verdant Cloak.'],['new','Enabled the following existing Helmet microtransactions for Path of Exile 2: <strong>Assassin Hood, Black and White Hood, Cursed Hat, Eyrie Hood, Mageguard Hood, Scavenger Hood, and Wild Cougar Helmet.</strong>'],['new','Enabled all of the remaining <strong>Portrait Frame</strong> microtransactions for use in Path of Exile 2.'],['new','Enabled the existing <strong>Originator\'s and Awakener\'s Character Effect</strong> microtransactions for use in Path of Exile 2.'],['new','Enabled the <strong>Something Fishy, Trapped Wisps, and Not the Bees!</strong> Chest Extra Effect microtransactions for use in Path of Exile 2.'],['new','Enabled the existing <strong>Anchor Drop Rare Finisher Effect</strong> microtransaction for use in Path of Exile 2.'],['new','Enabled the existing <strong>Torture Mace</strong> microtransaction for use in Path of Exile 2.'],['new','Enabled the existing <strong>Mirage Gauntlet</strong> microtransaction for use in Path of Exile 2.'],['new','Enabled the existing <strong>Twilight Helmet Attachment</strong> microtransaction for use in Path of Exile 2.'],['new','Enabled the existing <strong>Coliseum Helmet Attachment, Swan Crest Helmet Attachment, and Aquila Crest Helmet Attachment</strong> microtransactions for use in Path of Exile 2.'],['change','The <strong>Bronze and Silver Marionette Character Skins</strong> now have a second tier that allows you to hide the base character armour.'],['buff','The <strong>Exile\'s Pilfering Ring and Tracking Scroll of Crafting</strong> now additionally track Hinekora\'s Lock and Fracturing Orb items, useful for high value crafting outcomes.'],['buff','The <strong>Tracking Scroll of Headhunting</strong> has been updated to also track some new bosses.']]},
{id:'bugs',title:'Bug Fixes',icon:'🔧',sub:'Bug Fixes',e:[['fix','Fixed a bug where <strong>Life Flasks</strong> could not always be used while at full life with the Enduring Elixirs Pathfinder Notable Passive Skill.'],['fix','Fixed a bug where the <strong>Ritualist\'s Ritual Sacrifice</strong> skill gained a cooldown at level 20 specifically. Information about using Ritual Sacrifice on yourself has been folded into the skill\'s description.'],['fix','Fixed a bug where <strong>Pounce</strong> was providing additional Mark Effect to Predator\'s Mark or socketed Marks.'],['fix','Fixed an issue that prevented <strong>Mirage Archer and Mirage Deadeye</strong> from properly rotating to follow their target while using Rapid Shot and similar Skills.'],['fix','Fixed an issue that allowed certain Skills to be socketed into <strong>Mirage Archer and Mirage Deadeye</strong> that should have been prevented.'],['fix','Fixed a bug that caused <strong>Devour and Feral Invocation</strong> to not interact correctly.'],['fix','Fixed a bug where <strong>Minion Instability</strong> did not bypass Last Gasp.'],['fix','Fixed a bug where <strong>Thunderstorms</strong> could be created out of bounds.'],['fix','Fixed an issue where <strong>Hollow Palm Technique</strong> was not providing its bonuses to most skills that could be used with any Martial Weapon. Now replaces your unarmed base damage for affected attacks, rather than adding damage on top of base unarmed damage.'],['fix','Fixed a bug that could cause modifiers to <strong>unarmed critical hit chance</strong> to not be applied to displayed critical hit chance on the skill information popout.'],['fix','Fixed several issues with mechanics that make <strong>modifiers to number of projectiles</strong> apply to other values instead.'],['fix','Fixed some cases where stats giving chances for <strong>additional projectiles</strong> didn\'t apply to skills like Rain of Arrows that use the number of projectiles to determine a number of things to place.'],['fix','Fixed some cases where stats for <strong>additional chains</strong> didn\'t apply to some beam skills.'],['fix','Fixed a bug where the benefits <strong>Quality provided to Comet</strong> were not functioning.'],['fix','Fixed a bug where <strong>Devour and Lightning Warp</strong> were able to devour or explode some Corpses they shouldn\'t.'],['fix','Fixed a bug where <strong>Poison Spores Support</strong> did not have appropriate vendor and asynchronous trade prices.'],['fix','Fixed a bug where <strong>Burning Inscription Support</strong> would create ignited ground around a monster instead of on top of the Runic Inscription.'],['fix','Fixed a bug where the <strong>Low Tolerance Passive Skill</strong> was incorrectly described as increased Effect of Poison instead of increased Magnitude.'],['fix','Fixed a bug where <strong>Arctic Howl</strong> could empower you in human form while using Echoing Cry.'],['fix','Fixed some issues where <strong>ice crystals from Glacial Bolt</strong> could have weird damage calculations in some situations.'],['fix','Fixed a bug where the <strong>Rathpith Globe Unique Focus</strong> was missing its unique on-cast effect. Existing items won\'t be fixed unless you use a Divine Orb on them.'],['fix','Fixed a bug where <strong>Tactician\'s Cannons, Ready! Notable Passive Skill</strong> would not cause totems to attack when the player uses Molten Blast, Rolling Magma, Oil Barrage, or Power Charged Falling Thunder.'],['fix','Fixed a bug where the <strong>Melting Maelstrom Unique Ultimate Mana Flask</strong> was unable to hit enemies.'],['fix','Fixed a bug where attacks that struck with both weapons simultaneously while <strong>dual wielding</strong> would have a longer attack time than intended. The intention is for these skills to use the average attack time of your weapons.'],['fix','Fixed a bug where Skills that cost a percentage of maximum Energy Shield <strong>could not be used if you had no maximum Energy Shield</strong>.'],['fix','Fixed a bug where the stat giving a chance for projectiles to <strong>chain from terrain</strong> did not correctly count how many chains had been used, allowing projectiles in some cases to chain forever from terrain.'],['fix','Fixed a bug where <strong>Forge Hammer Slams</strong> would not count when tracking slams for the Titan\'s Ancestral Empowerment Notable Passive Skill.'],['fix','Fixed a bug where <strong>Heightened Charges Support</strong> would not apply to Flicker Strike\'s extra flickers per power charge consumed.'],['fix','Fixed a bug where <strong>Living Lightning II</strong> did not scale its level from the Gem it was Supporting.'],['fix','Fixed a bug where <strong>Into the Breach</strong> would not benefit from the Selfless Remnants Support Gem.'],['fix','Fixed numerous bugs related to the player versions of <strong>Azmeri Spirit Possessions</strong> (from the Rite of Passage Unique Charm) not using their skills or otherwise not functioning correctly. Player versions now deal dramatically more damage and use their skills more frequently. Enemy versions are unchanged.'],['fix','Fixed a bug where <strong>Dialla\'s Desire Lineage Support</strong> did not grant quality to Meta Skill gems and Item-granted Skill Gems.'],['fix','Fixed a bug where <strong>Hayoxi\'s Fulmination Lineage Support</strong> was able to support non-Curse Skills.'],['fix','Fixed a bug with the <strong>Heavy Armour Notable Passive Skill</strong>, and adjusted the description to be more clear.'],['fix','Fixed an issue where <strong>Shockwave Totem</strong> was able to be socketed into Ancestral Warrior Totem.'],['fix','Fixed a bug where <strong>Echoing Cry</strong> was able to support Ancestral Cry.'],['fix','Fixed some unintended supportability with <strong>Mirage Archer and Deadeye</strong> for some Skills.'],['fix','Fixed a bug where the calculation for <strong>Infernal Legion</strong> was always a critical hit if it had any amount of critical hit chance.'],['fix','Fixed a bug where some types of reviving minion that are intended to inherit player movement speed were not doing so. Specifically: <strong>Smith of Kitava\'s Manifest Weapon, Rhoa Mount</strong> (while the player is dismounted), and <strong>Hyenas</strong> summoned by the Hysseg\'s Claw Unique Talisman.'],['fix','Fixed some cases where two effects Empowering one skill use <strong>would not stack</strong> as expected.'],['fix','Fixed an edge-case interaction with the <strong>Blood Price Unique Helmet\'s</strong> reservation combining with other reservations.'],['fix','Fixed some cases of Skills that are inherently triggered <strong>not being considered triggered skills</strong> for other stats.'],['fix','Fixed a bug that caused <strong>Grim Feast</strong> to sometimes fail to revive minions.'],['fix','Fixed a bug where projectiles were ignoring <strong>Ice Crystals created by Frozen Locus</strong>.'],['fix','Fixed a bug that caused <strong>Ice Nova</strong> to have the wrong visual effects and audio when repeated.'],['fix','Fixed a bug where the <strong>His Winnowing Flame skill</strong> (from The Unborn Lich unique staff) applied critical weakness on hit, and another bug where its triggered explosions from consuming Ignite dealt no damage.'],['fix','Fixed a bug where <strong>channelled skills</strong> could not be interrupted by another channelled skill.'],['fix','Fixed a bug where <strong>Abyss Precursor Tablets</strong> would add 1 additional Abyss each, instead of just enabling Abyss spawning.'],['fix','Fixed a bug where <strong>negative Toughness</strong> did not apply more damage taken to the target. Now negative values of Toughness apply an equal amount of More Damage Taken. Each 100% of toughness halves damage taken; each -100% doubles it.'],['fix','Fixed a bug that caused players to be unable to respawn if they died to <strong>Atziri, the Red Queen, or Xipocado, the Royal Architect</strong> in party play.'],['fix','Fixed a bug where bosses could occasionally urrounded by enemies.'],['fix','Fixed an issue where you could be desynced when walking near the <strong>Tree of Souls</strong> after freeing the Hooded One in Grelwood.'],['fix','Fixed a bug that could cause the player to visually <strong>move away from the centre of the screen</strong> when slowed while in Werewolf form.'],['fix','Fixed an issue where the following quests wouldn\'t complete if you left the area before the boss had finished their death animation: <strong>Shrike Island, Isle of Kin, Whakapanu Island, Abandoned Prison</strong>.'],['fix','Fixed a bug where <strong>Soul Core Ultimatum Encounters</strong> could be completed using a single Soul Core.'],['fix','Fixed a rare issue where there wasn\'t a Small Soul Core available to use in the first Stone Altar in <strong>Jiquani\'s Machinarium</strong>.'],['fix','Fixed an issue where the <strong>Abyss world map icon at Ngakanu</strong> failed to complete when completing the corresponding Abyssal Depths.'],['fix','Fixed a bug where the <strong>Shoreline Hideout</strong> world map icon did not complete.'],['fix','Fixed an issue where <strong>ground effects</strong> could display incorrectly in Path of Mourning.'],['fix','Fixed an issue where certain sources of player movement would sometimes cause the player to <strong>move in a slightly different direction</strong> from what was intended. Particularly noticeable on controller and with skills that have inbuilt movement.'],['fix','Fixed an issue where <strong>Parry\'s description</strong> did not state that all hits can be parried, instead just mentioning strikes and projectiles.'],['fix','Fixed an issue where <strong>Varashta\'s Blessing Lineage Support</strong> did not state that it does not modify the skills of minions. Description-only change.'],['fix','Fixed an issue where <strong>Herald of Blood</strong> incorrectly stated that its damage was based on maximum Life; it now correctly states that its damage is based on Blood Loss.'],['fix','Fixed a bug where various <strong>hit sound effects</strong> were playing too loudly from party members.'],['fix','Fixed a bug that would prevent the <strong>audio cue for Energy Shield being depleted</strong> from playing if the cause of the depletion was damage over time.'],['fix','Fixed a bug where hovering over <strong>Totems in the Skills panel</strong> would incorrectly prompt you to Right Click to activate if you had the Ancestral Bond Keystone Passive Skill allocated.'],['fix','Fixed a bug where items that could not have an <strong>Exalted Orb</strong> applied to them were incorrectly highlighted when you went to use an Exalted Orb.'],['fix','Fixed a bug where <strong>double-clicking a portal or area transition</strong> with a confirmation popup would display that popup twice.'],['fix','Fixed an issue where <strong>Boss health bars</strong> would be visible inside of the Atlas screen.'],['fix','Fixed a bug where your <strong>friends list</strong> could sometimes appear blank on PlayStation after experiencing an instance crash.'],['fix','Fixed a bug where the <strong>upgraded variants of Grip of Kulemak</strong> could not be stored in the Unique Stash Tab.'],['fix','Fixed a bug where the <strong>presence radius indicator</strong> could stop working in certain situations.'],['fix','Fixed a bug where the <strong>unsupported character glyph</strong> was showing in the thousands place for certain locales.'],['fix','Fixed a bug that could cause Skills granted by Ascendancy Passive Skills to be <strong>hidden from the list of applicable Skills</strong> when cutting a Support Gem.'],['fix','Fixed a bug where Word by Word text navigation (Ctrl+Left/Right) in text fields would incorrectly <strong>wrap to the end of the text input</strong> in some situations.'],['fix','Fixed a bug where having the <strong>Hostile Takeover</strong> quest completed on another character would show the Act 4 World Map prior to your character being in Act 4.'],['fix','Fixed a bug where the <strong>bulk move action</strong> wasn\'t available in the market earnings page while playing with a controller.'],['fix','Fixed a bug where <strong>players revived while inside another object</strong> would not be moved to safety.'],['fix','Fixed a bug where you could not select <strong>Always Attack Without Moving</strong> for some Skills.'],['fix','Fixed an issue where <strong>disabling the crossplay setting</strong> when playing on console would carry across when you logged into that account on a PC.'],['fix','Fixed a bug where <strong>couch co-op players</strong> trying to join a public party would be refused if the party only had just enough space for them.'],['fix','Fixed a bug in couch co-op where <strong>other players could be wrongly kicked</strong> from the party if Player 2 created and entered a Map.'],['fix','Fixed a bug where <strong>Xipocado\'s Console</strong> could not be interacted with when playing in couch co-op.'],['fix','Fixed a bug where <strong>disconnecting and reconnecting a controller</strong> would disable haptics.'],['fix','Fixed a bug where <strong>crossplay could be disabled</strong> while the setting still showed it as enabled.'],['fix','Fixed a bug where you could try to <strong>select characters in two different Leagues</strong> when playing in couch co-op.'],['fix','Fixed an issue where selecting <strong>Solo Self-Found</strong> in the character selection filter greyed-out the create character button.'],['fix','Fixed a bug where <strong>controller haptic feedback for low-health</strong> continued to play while the game was paused.'],['fix','Fixed a bug where you could become <strong>stuck inside scenery when exiting hideout editing mode</strong> when using a controller.'],['fix','Fixed an issue where the <strong>Enezun\'s Charge Unique Wand</strong> was missing its 3D model.'],['fix','Fixed a bug where <strong>Pounce\'s Gem art</strong> did not reflect it being a Meta Gem.'],['fix','Fixed an issue where the <strong>Consuming Tentacle Rare Finisher Effect</strong> was previously stated as being enabled in Path of Exile 2 but could not be equipped.'],['fix','Fixed an issue where the <strong>Black Hole Rare Finisher Effect</strong> was previously stated as being enabled in Path of Exile 2 but could not be equipped.'],['fix','Fixed an issue where the <strong>Dragon Fire Rare Finisher Effect</strong> was previously stated as being enabled in Path of Exile 2 but could not be equipped.'],['fix','Fixed a bug where the <strong>Arachnamagus Portal Effect</strong> microtransaction was missing its effects.']]}

// ── RENDER ───────────────────────────────────────────────────────────────────
function mkTag(type){
  const t=TAGS[type]||TAGS.new;
  const cls={new:'tn',buff:'tb2',nerf:'tr',change:'tc',fix:'tf'}[type]||'tn';
  return `<span class="etag ${cls}">${t[0]} ${t[1]}</span>`;
}

// Style secondary info within entry text
function processText(html){
  // "(was X)" → muted italic — less visual weight, clearly supplementary
  html=html.replace(/\(was ([^)]+)\)/g,'<span class="was">(was $1)</span>');
  // "(previously X)" → same treatment
  html=html.replace(/\(previously ([^)]+)\)/g,'<span class="was">(previously $1)</span>');
  return html;
}

function buildAll(){
  const main=document.getElementById('main');
  const sbLinks=document.getElementById('sbLinks');
  const drwBody=document.getElementById('drwBody');

  function makePills(container){
    PILLS.forEach(p=>{
      const btn=document.createElement('button');
      btn.className='pill'+(p.t==='all'?' on':'');
      btn.dataset.t=p.t;
      btn.innerHTML=`${p.s} ${p.l}`;
      btn.addEventListener('click',()=>setFilter(p.t));
      container.appendChild(btn);
    });
  }
  makePills(document.getElementById('mPills'));
  makePills(document.getElementById('dPills'));

  DATA.forEach(sec=>{
    // sidebar link
    const sl=document.createElement('a');
    sl.className='nav-lnk';sl.dataset.id=sec.id;
    sl.innerHTML=`<span class="nav-ic">${sec.icon}</span>${sec.title}<span class="nav-ct">${sec.hl?'':sec.e?sec.e.length:''}</span>`;
    sl.addEventListener('click',e=>{e.preventDefault();jumpTo(sec.id);});
    sbLinks.appendChild(sl);

    // drawer link
    const dl=document.createElement('a');
    dl.className='d-lnk';dl.dataset.id=sec.id;
    dl.innerHTML=`<span class="d-ico">${sec.icon}</span>${sec.title}<span class="d-cnt">${sec.hl?'':sec.e?sec.e.length:''}</span>`;
    dl.addEventListener('click',e=>{
      e.preventDefault();
      closeDrawer();
      setTimeout(()=>jumpTo(sec.id),340);
    });
    drwBody.appendChild(dl);

    // section element
    const el=document.createElement('div');
    el.className='section';el.id=sec.id;
    const sub=sec.sub?`<div class="sh-sub">${sec.sub}</div>`:'';
    let body='';
    if(sec.hl){
      body='<div class="hl-grid">'+sec.cards.map(c=>`
        <div class="hl-card ${c.c}">
          <div class="hl-lbl">${c.lb}</div>
          <div class="hl-h">${c.h}</div>
          <div class="hl-d">${c.d}</div>
        </div>`).join('')+'</div>';
    } else {
      body=(sec.e||[]).map(([t,txt])=>`<div class="entry" data-t="${t}">${mkTag(t)}${processText(txt)}</div>`).join('');
    }
    // NOTE: uses secToggle, not toggle (avoids shadowing native methods)
    el.innerHTML=`<div class="sec-hd" onclick="secToggle(this)">
      <span class="sh-ic">${sec.icon}</span>
      <div class="sh-wrap"><div class="sh-ttl">${sec.title}</div>${sub}</div>
      <span class="chev">▾</span>
    </div><div class="sec-body">${body}</div>`;
    main.appendChild(el);
  });
  main.appendChild(document.getElementById('noRes'));
}

// ── GLOBAL FUNCTIONS (accessible from inline onclick) ────────────────────────
// NOTE: named secToggle to avoid conflicts with any native toggle methods
function secToggle(hd){hd.parentElement.classList.toggle('shut')}

// NOTE: named jumpTo to avoid shadowing window.scrollTo
function jumpTo(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.remove('shut');
  const isMob=window.innerWidth<768;
  const off=isMob?90:0;
  const top=el.getBoundingClientRect().top+window.scrollY-off;
  window.scrollTo({top,behavior:'smooth'});
}

function gotoTop(){
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── FILTER + SEARCH ───────────────────────────────────────────────────────────
let aF='all',aS='';

function setFilter(t){
  aF=t;
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('on',p.dataset.t===t));
  applyFilters();
}

function applyFilters(){
  const q=aS.toLowerCase().trim();
  const active=q||aF!=='all';
  let tot=0,secs=0;
  document.querySelectorAll('.section[id]').forEach(sec=>{
    if(sec.id==='highlights'){sec.style.display=active?'none':'';return;}
    const entries=sec.querySelectorAll('.entry');
    let vis=0;
    entries.forEach(e=>{
      const tm=aF==='all'||e.dataset.t===aF;
      const qm=!q||e.textContent.toLowerCase().includes(q);
      const show=tm&&qm;
      e.classList.toggle('gone',!show);
      if(show){vis++;tot++;}
      if(show&&q){
        const safe=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
        // Only highlight text nodes to preserve HTML structure
        function hlNode(node){
          if(node.nodeType===3){
            const m=node.textContent.match(new RegExp(safe,'i'));
            if(m){
              const sp=document.createElement('span');
              sp.innerHTML=node.textContent.replace(new RegExp(`(${safe})`,'gi'),'<mark>$1</mark>');
              node.parentNode.replaceChild(sp,node);
            }
          } else if(node.nodeType===1&&node.tagName!=='MARK'){
            [...node.childNodes].forEach(hlNode);
          }
        }
        hlNode(e);
      } else if(!q){
        e.querySelectorAll('mark').forEach(m=>{
          m.replaceWith(document.createTextNode(m.textContent));
        });
        e.querySelectorAll('span:not(.etag):not(.was)').forEach(sp=>{
          if(!sp.innerHTML.match(/<[a-z]/)){
            sp.replaceWith(document.createTextNode(sp.textContent));
          }
        });
      }
    });
    if(vis>0){secs++;if(active)sec.classList.remove('shut');}
    sec.style.display=vis===0&&active?'none':'';
  });
  document.getElementById('noRes').classList.toggle('vis',tot===0&&active);
  const st=document.getElementById('srchStat');
  if(q){st.textContent=`${tot} result${tot!==1?'s':''} across ${secs} section${secs!==1?'s':''}`;st.classList.add('vis');}
  else st.classList.remove('vis');
}

// ── SEARCH OVERLAY ────────────────────────────────────────────────────────────
let savedYS=0;
function openSearch(){
  savedYS=window.scrollY;
  document.body.style.cssText+=`;overflow:hidden;position:fixed;top:-${savedYS}px;width:100%`;
  document.getElementById('srchOv').classList.add('open');
  document.getElementById('btnSrch').classList.add('lit');
  setTimeout(()=>document.getElementById('srchInp').focus(),50);
}
function closeSearch(){
  document.getElementById('srchOv').classList.remove('open');
  document.getElementById('btnSrch').classList.remove('lit');
  const y=savedYS;
  document.body.style.overflow='';document.body.style.position='';
  document.body.style.top='';document.body.style.width='';
  window.scrollTo(0,y);
}

// ── DRAWER ────────────────────────────────────────────────────────────────────
let savedYD=0;
function openDrawer(){
  savedYD=window.scrollY;
  document.body.style.cssText+=`;overflow:hidden;position:fixed;top:-${savedYD}px;width:100%`;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('btnSec').classList.add('lit');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('btnSec').classList.remove('lit');
  const y=savedYD;
  document.body.style.overflow='';document.body.style.position='';
  document.body.style.top='';document.body.style.width='';
  window.scrollTo(0,y);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  buildAll();

  // IntersectionObserver for sidebar active state
  const links=document.querySelectorAll('.nav-lnk,.d-lnk');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        const id=en.target.id;
        links.forEach(l=>l.classList.toggle('act',l.dataset.id===id));
      }
    });
  },{rootMargin:'-10% 0px -80% 0px'});
  document.querySelectorAll('.section[id]').forEach(s=>obs.observe(s));

  // Mobile search input
  const mi=document.getElementById('srchInp');
  mi.addEventListener('input',e=>{
    aS=e.target.value;
    const di=document.getElementById('deskInp');
    if(di)di.value=aS;
    applyFilters();
  });
  document.getElementById('srchCancel').addEventListener('click',()=>{
    mi.value='';aS='';
    const di=document.getElementById('deskInp');
    if(di)di.value='';
    applyFilters();
    closeSearch();
  });

  // Desktop search input
  const di=document.getElementById('deskInp');
  if(di){
    di.addEventListener('input',e=>{
      aS=e.target.value;
      mi.value=aS;
      applyFilters();
    });
  }

  // Keyboard
  document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='f'){
      e.preventDefault();
      if(window.innerWidth<768)openSearch();
      else if(di){di.focus();di.select();}
    }
    if(e.key==='Escape'){
      closeSearch();closeDrawer();
      if(aS){mi.value='';aS='';if(di)di.value='';applyFilters();}
    }
  });

  // Scroll top visibility (desktop)
  const stb=document.getElementById('stb');
  if(stb){
    window.addEventListener('scroll',()=>stb.classList.toggle('vis',window.scrollY>500),{passive:true});
  }

  // Swipe drawer to close
  const drw=document.getElementById('drawer');
  let ty=0;
  drw.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
  drw.addEventListener('touchmove',e=>{if(e.touches[0].clientY-ty>70)closeDrawer();},{passive:true});
});
</script>
